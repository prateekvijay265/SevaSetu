<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080D1A"/>
      <stop offset="50%" stop-color="#0B1329"/>
      <stop offset="100%" stop-color="#070A14"/>
    </linearGradient>

    <!-- Main Title Gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="45%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Shield/Logo Gradient -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Glowing Orbs -->
    <radialGradient id="glowLeft" cx="15%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="88%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1E293B" stroke-width="0.7" stroke-opacity="0.4"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base Rounded Card -->
  <rect x="2" y="2" width="996" height="256" rx="16" fill="url(#bgGrad)" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Ambient Glow Orbs -->
  <rect x="2" y="2" width="996" height="256" rx="16" fill="url(#glowLeft)"/>
  <rect x="2" y="2" width="996" height="256" rx="16" fill="url(#glowRight)"/>

  <!-- Grid Pattern Overlay -->
  <rect x="2" y="2" width="996" height="256" rx="16" fill="url(#grid)" opacity="0.85"/>

  <!-- Tech Accent Lines (Corners & Radar Traces) -->
  <path d="M 18 64 L 64 64 L 92 92" stroke="#00F2FE" stroke-width="1" stroke-dasharray="4 4" opacity="0.35" fill="none"/>
  <path d="M 982 196 L 936 196 L 908 168" stroke="#A855F7" stroke-width="1" stroke-dasharray="4 4" opacity="0.35" fill="none"/>

  <!-- Left Emblem Section (Concentric Radar Rings + AI Emblem) -->
  <g transform="translate(145, 130)">
    <!-- Radar Rings -->
    <circle cx="0" cy="0" r="78" stroke="#00F2FE" stroke-width="1" opacity="0.12" stroke-dasharray="6 6"/>
    <circle cx="0" cy="0" r="58" stroke="#00F2FE" stroke-width="1.2" opacity="0.25"/>
    <circle cx="0" cy="0" r="42" fill="#0F172A" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
    
    <!-- Glowing Shield / Bridge Icon -->
    <path d="M 0 -26 C 18 -26, 26 -20, 26 -8 C 26 10, 8 22, 0 28 C -8 22, -26 10, -26 -8 C -26 -20, -18 -26, 0 -26 Z" fill="url(#shieldGrad)" filter="url(#neonGlow)" opacity="0.85"/>
    
    <!-- Center AI Text inside emblem -->
    <text x="0" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">AI</text>
  </g>

  <!-- Right/Center Typography & Badges Section -->
  <g transform="translate(265, 0)">
    <!-- Pill Badge: NEXT-GEN SOCIAL IMPACT & AI -->
    <g transform="translate(0, 52)">
      <rect x="0" y="0" width="234" height="26" rx="13" fill="#0F172A" stroke="#00F2FE" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="14" cy="13" r="3.5" fill="#10B981"/>
      <text x="26" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" fill="#38BDF8" letter-spacing="1.2">NEXT-GEN SOCIAL IMPACT &amp; AI</text>
    </g>

    <!-- Main Title -->
    <text x="0" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" letter-spacing="-1">SevaSetu Foundation</text>

    <!-- Subtitle -->
    <text x="0" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#94A3B8" letter-spacing="0.2">Bridging Human Service &amp; Modern Neural Technology · Education · Women · Environment</text>

    <!-- Status / Terminal Line -->
    <g transform="translate(0, 198)">
      <text x="0" y="0" font-family="Consolas, Monaco, monospace" font-size="13" font-weight="600" fill="#10B981" letter-spacing="0.5">&gt; STATUS: 25,000+ Lives Impacted | Precision: 100% | Active Volunteers: 1,000+ | Latency: ~12ms</text>
    </g>
  </g>
</svg>
